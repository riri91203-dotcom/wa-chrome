<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>WhatsApp 自动回复</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <div class="popup-container">
    <h2>WhatsApp 自动回复</h2>

    <div class="status-card">
      <div class="status-row">
        <span class="label">插件状态</span>
        <span id="pluginStatus" class="value stopped">STOPPED</span>
      </div>
      <div class="status-row">
        <span class="label">运行阶段</span>
        <span id="appState" class="value">IDLE</span>
      </div>
      <div class="status-row">
        <span class="label">当前客户</span>
        <span id="currentChatId" class="value">-</span>
      </div>
      <div class="status-row">
        <span class="label">当前动作</span>
        <span id="currentAction" class="value multiline">等待操作</span>
      </div>
      <div class="status-row">
        <span class="label">队列进度</span>
        <span id="queueProgressText" class="value">0/0</span>
      </div>
      <div class="status-row">
        <span class="label">客服手机号</span>
        <input
          type="text"
          id="staffIdInput"
          class="input-field"
          placeholder="请输入客服的手机号"
          maxlength="20"
        />
      </div>
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn start">启动</button>
      <button id="stopBtn" class="btn stop">停止</button>
      <button id="refreshBtn" class="btn refresh">刷新状态</button>
    </div>

    <div id="tips" class="tips">
      后端接口、模型和 Prompt 均由后端统一配置。
    </div>
  </div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
